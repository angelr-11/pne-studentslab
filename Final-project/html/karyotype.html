<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>
        Chromosome Names
    </title>
</head>
<body style="background-color: lightcyan; font-family: 'Inter', sans-serif;
font-size: xx-large;">
    <h1>
        You chose to see the karyotype for: {{ species }}
    </h1>
    <strong>
        The names of the chromosomes are:
    </strong>
    <ul>
        {% for chromo in karyotype %}
            <li>{{chromo}}</li>
        {% endfor %}
    </ul>
    <p>
      <a href="http://127.0.0.1:8080/">
        Main Page
      </a>
    </p>
</body>
</html>
