<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Index</title>
</head>
<body style="background-color: beige; font-family: 'Inter', sans-serif;
font-size: large;">
    <h1>
        Browsing Human and Vertebrates Genome
    </h1>
    <strong>
        BASIC Level Services
    </strong>
    <p>
        1 - List of species in the genome database
    </p>
    <form action="/listSpecies" method="GET">
        <label>Limit: <input type="text" name="limit"></label>
        <br>
        <br>
        <input type="submit" value="Send">
    </form>
    <hr>
    <p>
        2 - Information about the karyotype
    </p>
    <form action="/karyotype" method="GET">
        <label>Select the species: <input type="text" name="species"></label>
        <br>
        <br>
        <input type="submit" value="Send">
    </form>
    <hr>
    <p>
        3 - Chromosome length
    </p>
    <form action="/chromosomeLength" method="GET">
        <label>Select the species: <input type="text" name="species"></label>
        <br>
        <br>
        <label>Select a chromosome: <input type="text" name="chromo"></label>
        <br>
        <br>
        <input type="submit" value="Send">
    </form>
</body>
</html>
