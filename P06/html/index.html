<!DOCTYPE html>
    <html lang="en" dir="ltr">
      <head>
        <meta charset="utf-8">
        <title>INDEX</title>
      </head>
      <body>
        <h1>SEQ2 server</h1>
        <p>Access to the server  </p>
        <hr>
        <form action="/ping" method="get">
          <label>Is the server alive?</label>
          <input type="submit" value="PING">
        </form>
        <hr>
        <form action="/get" method="get">
          <label for="menu">Get a sequence. Select a sequence number</label>
          <select name="menu" size="1">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
          <input type="submit" value="GET">
        </form>
        <hr>
        <form action="/gene" method="get">
          <label for="gene">Get a gene, select a gene name</label>
          <select name=gene size="1">
            <option value="U5">U5</option>
            <option value="ADA">ADA</option>
            <option value="FRAT1">FRAT1</option>
            <option value="RNU6_269P">RNU6_269P</option>
            <option value="FXN">FXN</option>
          </select>
          <input type="submit" value="GENE">
        </form>
        <hr>
        <form action="/operation" method="get":>
          Write a sequence: <input type="text" name="an_seq">
          <div>
            <span>Select operation</span>
            <label><input type="radio" name="opt" value="Info"> Info</label>
            <label><input type="radio" name="opt" value="Comp"> Comp</label>
            <label><input type="radio" name="opt" value="Rev"> Rev</label>
          </div>
          <div>
            Perform operation <input type="submit" value="OPERATE!">
          </div>
        </form>
      </body>
    </html>
